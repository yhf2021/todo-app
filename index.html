<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">

    <!-- 登录/注册 -->
    <div id="authSection">
      <h1>✨ 我的待办清单</h1>
      <div class="auth-box">
        <input id="authUser" type="text" placeholder="用户名" autocomplete="username">
        <input id="authPass" type="password" placeholder="密码" autocomplete="current-password">
        <div class="auth-error" id="authError"></div>
        <div class="auth-btns">
          <button id="loginBtn">登录</button>
          <button id="registerBtn" class="btn-secondary">注册</button>
        </div>
      </div>
    </div>

    <!-- 待办 -->
    <div id="todoSection">
      <div class="todo-header">
        <h1>✨ 我的待办清单</h1>
        <div class="user-info">
          <span class="date" id="dateDisplay"></span>
          <span class="username" id="usernameDisplay"></span>
          <button class="logout-btn" id="logoutBtn">退出</button>
        </div>
      </div>
      <div class="input-row">
        <input id="input" type="text" placeholder="今天要做什么？" autofocus>
        <select id="prioritySelect">
          <option value="high">🔴 高</option>
          <option value="medium" selected>🟡 中</option>
          <option value="low">🟢 低</option>
        </select>
        <button id="addBtn">➕ 添加</button>
      </div>
      <div class="hint" id="hint">请输入待办内容</div>
      <div class="stats">
        <span>待完成 <span class="num pending" id="pendingCount">0</span></span>
        <span>已完成 <span class="num done" id="doneCount">0</span></span>
      </div>
      <ul class="todo-list" id="todoList"></ul>
      <div class="action-bar">
        <button class="clear-btn" id="clearBtn">🗑️ 清空已完成</button>
        <button class="clear-all-btn" id="clearAllBtn">清空全部</button>
      </div>
    </div>

  </div>

  <script src="js/api.js"></script>
  <script src="js/todo.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
