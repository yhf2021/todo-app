<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>待办事项</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #e0f0ff 0%, #b8daff 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 16px;
  }
  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(30, 90, 180, 0.15);
    padding: 32px 28px;
    width: 100%;
    max-width: 520px;
  }
  h1 {
    font-size: 24px;
    color: #1a3a6b;
    margin-bottom: 20px;
    text-align: center;
    font-weight: 700;
  }
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .input-row input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #d0e2ff;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row input:focus { border-color: #4a8cf7; }
  .input-row button {
    padding: 12px 24px;
    background: #4a8cf7;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .input-row button:hover { background: #3578e0; }
  .input-row button:active { transform: scale(0.96); }
  .stats {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #5a7aae;
    margin-bottom: 16px;
    padding: 0 2px;
  }
  .stats span { display: flex; align-items: center; gap: 4px; }
  .stats .num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 22px;
    height: 22px;
    border-radius: 11px;
    padding: 0 6px;
    font-size: 12px;
    font-weight: 700;
  }
  .stats .num.pending { background: #e8f0fe; color: #4a8cf7; }
  .stats .num.done { background: #e6f7ed; color: #2d9f5e; }
  .todo-list { list-style: none; }
  .todo-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: #f8fbff;
    border-radius: 10px;
    margin-bottom: 8px;
    transition: background 0.15s;
  }
  .todo-item:hover { background: #f0f6ff; }
  .todo-item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #4a8cf7;
    cursor: pointer;
    flex-shrink: 0;
  }
  .todo-item .text {
    flex: 1;
    font-size: 15px;
    color: #1f2a44;
    word-break: break-word;
    transition: color 0.2s;
  }
  .todo-item .text.done {
    text-decoration: line-through;
    color: #9aafcf;
  }
  .todo-item .del-btn {
    background: none;
    border: none;
    font-size: 18px;
    color: #b0c8e8;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }
  .todo-item .del-btn:hover { color: #e05050; background: #ffe8e8; }
  .empty-msg {
    text-align: center;
    color: #9aafcf;
    font-size: 14px;
    padding: 30px 0 10px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>📋 待办事项</h1>
  <div class="input-row">
    <input id="input" type="text" placeholder="输入新的待办..." autofocus>
    <button id="addBtn">添加</button>
  </div>
  <div class="stats">
    <span>待完成 <span class="num pending" id="pendingCount">0</span></span>
    <span>已完成 <span class="num done" id="doneCount">0</span></span>
  </div>
  <ul class="todo-list" id="todoList"></ul>
</div>
<script>
  const STORAGE_KEY = 'todos';
  let todos = loadTodos();

  const input = document.getElementById('input');
  const addBtn = document.getElementById('addBtn');
  const list = document.getElementById('todoList');
  const pendingCount = document.getElementById('pendingCount');
  const doneCount = document.getElementById('doneCount');

  function loadTodos() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function saveTodos() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
  }

  function render() {
    const pending = todos.filter(t => !t.done).length;
    const done = todos.filter(t => t.done).length;
    pendingCount.textContent = pending;
    doneCount.textContent = done;

    if (todos.length === 0) {
      list.innerHTML = '<li class="empty-msg">暂无待办事项</li>';
      return;
    }

    list.innerHTML = todos.map((t, i) => `
      <li class="todo-item">
        <input type="checkbox" ${t.done ? 'checked' : ''} data-index="${i}">
        <span class="text${t.done ? ' done' : ''}">${escapeHtml(t.text)}</span>
        <button class="del-btn" data-index="${i}" title="删除">&times;</button>
      </li>
    `).join('');
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function addTodo() {
    const text = input.value.trim();
    if (!text) return;
    todos.push({ text, done: false });
    saveTodos();
    render();
    input.value = '';
    input.focus();
  }

  function toggleTodo(index) {
    todos[index].done = !todos[index].done;
    saveTodos();
    render();
  }

  function deleteTodo(index) {
    todos.splice(index, 1);
    saveTodos();
    render();
  }

  addBtn.addEventListener('click', addTodo);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

  list.addEventListener('click', e => {
    const checkbox = e.target.closest('input[type="checkbox"]');
    const delBtn = e.target.closest('.del-btn');
    if (checkbox) toggleTodo(+checkbox.dataset.index);
    if (delBtn) deleteTodo(+delBtn.dataset.index);
  });

  render();
</script>
</body>
</html>
